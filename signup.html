<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account | Smart Retail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <div class="app">
    <!-- Animated Smart Retail Background -->
    <div class="scene">
      <div class="grid"></div>
      <div class="glow" data-speed="2"></div>

      <div class="chart-cluster" data-speed="3">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <div class="node product-1" data-speed="5">
        <span class="node-emoji">👟</span>
        <div>
          <div class="node-title">Shoes +42%</div>
          <div class="node-sub">Top trending product</div>
        </div>
      </div>

      <div class="node product-2" data-speed="4">
        <span class="node-emoji">🎧</span>
        <div>
          <div class="node-title">Headphones</div>
          <div class="node-sub">Low stock · Auto-reorder</div>
        </div>
      </div>

      <div class="node product-3" data-speed="6">
        <span class="node-emoji">📱</span>
        <div>
          <div class="node-title">Mobiles</div>
          <div class="node-sub">High-margin campaign live</div>
        </div>
      </div>

      <div class="node cart" data-speed="7">
        <span class="node-emoji">🛒</span>
        <div>
          <div class="node-title">Cart Automation</div>
          <div class="node-sub">Abandoned cart recovery</div>
        </div>
      </div>

      <div class="node truck" data-speed="3">
        <span class="node-emoji">🚚</span>
        <div>
          <div class="node-title">Smart Delivery</div>
          <div class="node-sub">ETA optimized by AI</div>
        </div>
      </div>
    </div>

    <!-- Signup Card -->
    <div class="signup-card">
      <h2>Create Account</h2>
      <p class="subtitle">Smart Retail Sales Analytics &amp; Automations</p>

      <form onsubmit="handleSignup(event)">
        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" type="text" placeholder="Enter your full name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create a password" required />
        </div>

        <div class="field">
          <label for="confirm">Confirm Password</label>
          <input id="confirm" type="password" placeholder="Re-enter your password" required />
        </div>

        <button class="signup-btn" type="submit">Create Account</button>
      </form>

      <div class="links">
        Already have an account?
        <a href="login.html">Login</a>
      </div>
    </div>
  </div>

    <script src="signup.js"></script>
</body>
</html>
